<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прокси камеры неба</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: #0d1117;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        color: #c9d1d9;
      }

      .container {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 24px;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        color: #f0f6fc;
        margin-bottom: 24px;
        font-size: 22px;
        font-weight: 600;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        background: #1b3826;
        color: #3fb950;
        border: 1px solid #2ea043;
      }

      .info-grid {
        display: grid;
        gap: 8px;
        margin-bottom: 24px;
      }

      .info-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 12px 14px;
        background: #0d1117;
        border: 1px solid #21262d;
        border-radius: 8px;
        gap: 12px;
      }

      .info-label {
        color: #8b949e;
        font-size: 13px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .info-value {
        color: #c9d1d9;
        font-weight: 500;
        font-size: 13px;
        text-align: right;
        word-break: break-all;
      }

      .endpoints {
        margin-top: 24px;
      }

      .endpoints h2 {
        color: #f0f6fc;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .endpoint-item {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 6px;
        background: #0d1117;
        border: 1px solid #21262d;
        border-radius: 8px;
      }

      .endpoint-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        text-decoration: none;
        color: inherit;
        width: 100%;
        border-radius: 8px;
      }

      .endpoint-link:hover {
        background: #12161a;
      }

      .method {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        min-width: 44px;
        text-align: center;
        flex-shrink: 0;
      }

      .method-get {
        background: #1b3826;
        color: #3fb950;
        border: 1px solid #2ea043;
      }

      .path {
        color: #58a6ff;
        font-family:
          "SF Mono", "Cascadia Code", "Fira Code", "Courier New", monospace;
        font-size: 13px;
        word-break: break-all;
      }

      @media (max-width: 400px) {
        .container {
          padding: 16px;
        }

        h1 {
          font-size: 18px;
        }

        .info-item {
          padding: 10px 12px;
        }

        .info-label,
        .info-value {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>
        Прокси камеры неба
        <span class="status-badge">Работает</span>
      </h1>

      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Время работы</span>
          <span class="info-value">{{uptime}}</span>
        </div>
        <div class="info-item">
          <span class="info-label">Источник</span>
          <span class="info-value">{{sourceUrl}}</span>
        </div>
        <div class="info-item">
          <span class="info-label">Интервал обновления</span>
          <span class="info-value">{{refreshInterval}} с</span>
        </div>
        <div class="info-item">
          <span class="info-label">Время кеша</span>
          <span class="info-value">{{cacheMaxAge}} с</span>
        </div>
      </div>

      <div class="endpoints">
        <h2>Эндпоинты</h2>
        <div class="endpoint-item">
          <a href="/" class="endpoint-link" target="_blank">
            <span class="method method-get">GET</span>
            <span class="path">/</span>
          </a>
        </div>
        <div class="endpoint-item">
          <a href="/image.webp" class="endpoint-link" target="_blank">
            <span class="method method-get">GET</span>
            <span class="path">/image.webp</span>
          </a>
        </div>
        <div class="endpoint-item">
          <a href="/image.json" class="endpoint-link" target="_blank">
            <span class="method method-get">GET</span>
            <span class="path">/image.json</span>
          </a>
        </div>
        <div class="endpoint-item">
          <a href="/health" class="endpoint-link" target="_blank">
            <span class="method method-get">GET</span>
            <span class="path">/health</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
